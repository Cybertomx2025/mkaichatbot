<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MK CHAT AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #07070a;
      --bg-secondary: #0d0d12;
      --fg: #f0f0f5;
      --muted: #7a7a8c;
      --accent: #f59e0b;
      --accent-bright: #fbbf24;
      --accent-dim: rgba(245, 158, 11, 0.15);
      --card: rgba(18, 18, 25, 0.85);
      --border: rgba(255, 255, 255, 0.08);
      --user-bubble: linear-gradient(135deg, #1a1a2e 0%, #16162a 100%);
      --ai-bubble: linear-gradient(135deg, #0f0f18 0%, #0a0a12 100%);
      --glow: rgba(245, 158, 11, 0.4);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      overflow: hidden;
    }

    .font-mono {
      font-family: 'Space Mono', monospace;
    }

    /* Animated background */
    .bg-container {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 0;
    }

    .noise-overlay {
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      opacity: 0.03;
      pointer-events: none;
    }

    .gradient-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      animation: orbDrift 20s ease-in-out infinite;
    }

    .orb-1 {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(245, 158, 11, 0.3) 0%, transparent 70%);
      top: -15%;
      right: -10%;
    }

    .orb-2 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(220, 38, 38, 0.2) 0%, transparent 70%);
      bottom: -10%;
      left: -5%;
      animation-delay: -10s;
    }

    .orb-3 {
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, transparent 70%);
      top: 40%;
      left: 30%;
      animation-delay: -5s;
    }

    @keyframes orbDrift {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(40px, -30px) scale(1.1); }
      50% { transform: translate(-20px, 40px) scale(0.95); }
      75% { transform: translate(30px, 20px) scale(1.05); }
    }

    /* Grid lines */
    .grid-lines {
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(rgba(245, 158, 11, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245, 158, 11, 0.03) 1px, transparent 1px);
      background-size: 80px 80px;
      mask-image: radial-gradient(ellipse at center, black 20%, transparent 70%);
    }

    /* Floating particles */
    .particles-container {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: var(--accent);
      border-radius: 50%;
      opacity: 0;
      animation: particleFloat 8s ease-in-out infinite;
    }

    @keyframes particleFloat {
      0% { opacity: 0; transform: translateY(100vh) scale(0); }
      10% { opacity: 0.6; }
      90% { opacity: 0.6; }
      100% { opacity: 0; transform: translateY(-100vh) scale(1); }
    }

    /* Main container */
    .chat-wrapper {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 1rem;
    }

    /* Header */
    .chat-header {
      padding: 1.25rem 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1rem;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .brand-icon {
      position: relative;
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, var(--accent) 0%, #d97706 100%);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 32px rgba(245, 158, 11, 0.3);
    }

    .brand-icon::before {
      content: '';
      position: absolute;
      inset: -3px;
      background: linear-gradient(135deg, var(--accent), transparent, var(--accent));
      border-radius: 19px;
      z-index: -1;
      opacity: 0.5;
      animation: iconGlow 3s ease-in-out infinite;
    }

    @keyframes iconGlow {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.6; }
    }

    .brand-name {
      font-size: 1.75rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--fg) 0%, var(--muted) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--muted);
    }

    .status-indicator {
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
      box-shadow: 0 0 12px rgba(34, 197, 94, 0.6);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.2); opacity: 0.7; }
    }

    /* Messages area */
    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 0;
      scroll-behavior: smooth;
    }

    .messages-container::-webkit-scrollbar {
      width: 5px;
    }

    .messages-container::-webkit-scrollbar-track {
      background: transparent;
    }

    .messages-container::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    /* Welcome */
    .welcome-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      padding: 2rem;
    }

    .welcome-icon-container {
      position: relative;
      margin-bottom: 2rem;
    }

    .welcome-icon {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, var(--accent) 0%, #d97706 100%);
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 
        0 20px 60px rgba(245, 158, 11, 0.4),
        0 0 0 1px rgba(255, 255, 255, 0.1) inset;
      animation: floatIcon 4s ease-in-out infinite;
    }

    @keyframes floatIcon {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    .welcome-icon-ring {
      position: absolute;
      inset: -20px;
      border: 1px solid var(--accent-dim);
      border-radius: 40px;
      animation: ringPulse 3s ease-in-out infinite;
    }

    @keyframes ringPulse {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.1); opacity: 0.2; }
    }

    .welcome-title {
      font-size: 2.5rem;
      font-weight: 800;
      margin-bottom: 0.75rem;
      letter-spacing: -0.03em;
    }

    .welcome-subtitle {
      font-size: 1.1rem;
      color: var(--muted);
      max-width: 400px;
      line-height: 1.7;
    }

    .suggestions-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.75rem;
      margin-top: 2.5rem;
      max-width: 500px;
      width: 100%;
    }

    .suggestion-card {
      padding: 1rem 1.25rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      text-align: left;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      font-size: 0.875rem;
      color: var(--fg);
    }

    .suggestion-card:hover {
      border-color: var(--accent);
      background: rgba(245, 158, 11, 0.05);
      transform: translateY(-3px);
      box-shadow: 0 10px 40px rgba(245, 158, 11, 0.1);
    }

    .suggestion-icon {
      font-size: 1.25rem;
      margin-bottom: 0.5rem;
      display: block;
    }

    /* Messages */
    .message {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      animation: messageSlide 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes messageSlide {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .message, .welcome-icon, .gradient-orb, .particle, .brand-icon::before {
        animation: none;
      }
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.875rem;
      flex-shrink: 0;
    }

    .avatar-user {
      background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
      box-shadow: 0 4px 20px rgba(59, 130, 246, 0.3);
    }

    .avatar-ai {
      background: linear-gradient(135deg, var(--accent) 0%, #d97706 100%);
      color: #000;
      box-shadow: 0 4px 20px rgba(245, 158, 11, 0.3);
    }

    .message-body {
      flex: 1;
      min-width: 0;
    }

    .bubble {
      padding: 1rem 1.25rem;
      border-radius: 18px;
      line-height: 1.7;
      font-size: 0.9375rem;
    }

    .bubble-user {
      background: var(--user-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 6px;
    }

    .bubble-ai {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-bottom-right-radius: 6px;
      position: relative;
    }

    .bubble-ai::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: linear-gradient(180deg, var(--accent), transparent);
      border-radius: 3px 0 0 3px;
    }

    .timestamp {
      font-size: 0.6875rem;
      color: var(--muted);
      margin-top: 0.5rem;
      padding-left: 0.25rem;
      font-family: 'Space Mono', monospace;
    }

    /* Typing indicator */
    .typing-bubble {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 1rem 1.5rem;
    }

    .typing-dot {
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      animation: typingBounce 1.4s ease-in-out infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.15s; }
    .typing-dot:nth-child(3) { animation-delay: 0.3s; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
      30% { transform: translateY(-8px); opacity: 1; }
    }

    /* Input area */
    .input-section {
      padding: 1.5rem 0;
      background: linear-gradient(to top, var(--bg) 50%, transparent);
    }

    .input-box {
      display: flex;
      gap: 0.75rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0.625rem;
      transition: all 0.3s;
      backdrop-filter: blur(20px);
    }

    .input-box:focus-within {
      border-color: var(--accent);
      box-shadow: 
        0 0 0 3px var(--accent-dim),
        0 10px 40px rgba(245, 158, 11, 0.1);
    }

    .input-box textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--fg);
      font-family: inherit;
      font-size: 0.9375rem;
      padding: 0.625rem 0.875rem;
      resize: none;
      min-height: 24px;
      max-height: 150px;
    }

    .input-box textarea::placeholder {
      color: var(--muted);
    }

    .send-button {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--accent) 0%, #d97706 100%);
      border: none;
      border-radius: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      flex-shrink: 0;
    }

    .send-button:hover:not(:disabled) {
      transform: scale(1.08);
      box-shadow: 0 8px 30px rgba(245, 158, 11, 0.4);
    }

    .send-button:active:not(:disabled) {
      transform: scale(0.95);
    }

    .send-button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .send-button:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }

    /* Code blocks */
    .bubble pre {
      background: rgba(0, 0, 0, 0.4);
      border-radius: 10px;
      padding: 0.875rem 1rem;
      overflow-x: auto;
      margin: 0.75rem 0;
      border: 1px solid var(--border);
    }

    .bubble code {
      font-family: 'Space Mono', monospace;
      font-size: 0.8125rem;
    }

    .bubble p {
      margin-bottom: 0.5rem;
    }

    .bubble p:last-child {
      margin-bottom: 0;
    }

    /* Copy button */
    .message-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.625rem;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .message:hover .message-actions {
      opacity: 1;
    }

    .action-button {
      display: flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.375rem 0.75rem;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .action-button:hover {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Toast */
    .toast-notification {
      position: fixed;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%) translateY(30px);
      background: var(--card);
      border: 1px solid var(--accent);
      padding: 0.875rem 1.5rem;
      border-radius: 12px;
      font-size: 0.875rem;
      font-weight: 500;
      opacity: 0;
      visibility: hidden;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 1000;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    }

    .toast-notification.visible {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) translateY(0);
    }

    /* Responsive */
    @media (max-width: 640px) {
      .chat-wrapper {
        padding: 0 0.75rem;
      }
      
      .brand-name {
        font-size: 1.375rem;
      }
      
      .brand-icon {
        width: 44px;
        height: 44px;
        border-radius: 12px;
      }
      
      .welcome-title {
        font-size: 1.75rem;
      }
      
      .suggestions-grid {
        grid-template-columns: 1fr;
      }
      
      .suggestion-card {
        padding: 0.875rem 1rem;
      }
      
      .bubble {
        font-size: 0.875rem;
        padding: 0.875rem 1rem;
      }
      
      .avatar {
        width: 36px;
        height: 36px;
        border-radius: 12px;
        font-size: 0.75rem;
      }
      
      .status-badge span:last-child {
        display: none;
      }
    }
  </style>
</head>
<body>
  <!-- Background -->
  <div class="bg-container">
    <div class="noise-overlay"></div>
    <div class="grid-lines"></div>
    <div class="gradient-orb orb-1"></div>
    <div class="gradient-orb orb-2"></div>
    <div class="gradient-orb orb-3"></div>
    <div class="particles-container" id="particlesContainer"></div>
  </div>

  <!-- Main Chat Interface -->
  <div class="chat-wrapper">
    <!-- Header -->
    <header class="chat-header">
      <div class="brand">
        <div class="brand-icon">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
        </div>
        <h1 class="brand-name">MK CHAT AI</h1>
      </div>
      <div class="status-badge">
        <div class="status-indicator"></div>
        <span>Online</span>
        <span>| Powered by MK-Chat</span>
      </div>
    </header>

    <!-- Messages Area -->
    <div class="messages-container" id="messagesContainer">
      <!-- Welcome Screen -->
      <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-icon-container">
          <div class="welcome-icon-ring"></div>
          <div class="welcome-icon">
            <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
              <line x1="9" y1="10" x2="15" y2="10"/>
              <line x1="12" y1="7" x2="12" y2="13"/>
            </svg>
          </div>
        </div>
        <h2 class="welcome-title">How can I help you today?</h2>
        <p class="welcome-subtitle">I'm MK CHAT AI, your intelligent assistant. Ask me anything and I'll provide helpful, accurate responses.</p>
        
        <div class="suggestions-grid">
          <button class="suggestion-card" data-prompt="Explain how machine learning works in simple terms">
            <span class="suggestion-icon">🧠</span>
            Explain machine learning
          </button>
          <button class="suggestion-card" data-prompt="Write a Python function to find prime numbers">
            <span class="suggestion-icon">💻</span>
            Python prime numbers
          </button>
          <button class="suggestion-card" data-prompt="Give me 5 tips for better productivity">
            <span class="suggestion-icon">⚡</span>
            Productivity tips
          </button>
          <button class="suggestion-card" data-prompt="Create a business email template for client outreach">
            <span class="suggestion-icon">✉️</span>
            Business email template
          </button>
        </div>
      </div>

      <!-- Messages List -->
      <div id="messagesList"></div>
    </div>

    <!-- Input Section -->
    <div class="input-section">
      <div class="input-box">
        <textarea 
          id="messageInput"
          placeholder="Type your message..."
          rows="1"
          aria-label="Message input"
        ></textarea>
        <button class="send-button" id="sendButton" aria-label="Send message" disabled>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <p style="text-align: center; font-size: 0.6875rem; color: var(--muted); margin-top: 0.75rem; font-family: 'Space Mono', monospace;">
        Press Enter to send • Shift+Enter for new line
      </p>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast-notification" id="toast"></div>

  <script>
    // ============================================
    // CONFIGURATION - Replace with your Groq API key
    // ============================================
    const CONFIG = {
      apiKey: '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',  // <-- PUT YOUR API KEY HERE
      model: 'llama-3.3-70b-versatile',
      systemPrompt: 'You are MK CHAT AI, a helpful, friendly, and intelligent AI assistant. Provide clear, accurate, and well-structured responses. Use markdown formatting when helpful. Be concise but thorough.'
    };
    // ============================================

    // State
    let conversationHistory = [];
    let isGenerating = false;

    // DOM Elements
    const messagesContainer = document.getElementById('messagesContainer');
    const messagesList = document.getElementById('messagesList');
    const welcomeScreen = document.getElementById('welcomeScreen');
    const messageInput = document.getElementById('messageInput');
    const sendButton = document.getElementById('sendButton');
    const toast = document.getElementById('toast');
    const particlesContainer = document.getElementById('particlesContainer');

    // Create floating particles
    function createParticles() {
      for (let i = 0; i < 15; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 8 + 's';
        particle.style.animationDuration = (6 + Math.random() * 4) + 's';
        particlesContainer.appendChild(particle);
      }
    }

    // Show toast notification
    function showToast(message) {
      toast.textContent = message;
      toast.classList.add('visible');
      setTimeout(() => toast.classList.remove('visible'), 3000);
    }

    // Format timestamp
    function getTime() {
      return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    // Create message element
    function createMessage(role, content) {
      welcomeScreen.style.display = 'none';

      const messageEl = document.createElement('div');
      messageEl.className = 'message';

      const avatarClass = role === 'user' ? 'avatar-user' : 'avatar-ai';
      const avatarText = role === 'user' ? 'U' : 'MK';
      const bubbleClass = role === 'user' ? 'bubble-user' : 'bubble-ai';

      // Format content
      let formattedContent = content
        .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
        .replace(/`([^`]+)`/g, '<code style="background:rgba(0,0,0,0.3);padding:0.125rem 0.5rem;border-radius:4px;">$1</code>')
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/\*([^*]+)\*/g, '<em>$1</em>')
        .replace(/\n/g, '<br>');

      messageEl.innerHTML = `
        <div class="avatar ${avatarClass}">${avatarText}</div>
        <div class="message-body">
          <div class="bubble ${bubbleClass}">${formattedContent}</div>
          <div class="timestamp">${getTime()}</div>
          ${role === 'ai' ? `
            <div class="message-actions">
              <button class="action-button copy-btn" data-content="${encodeURIComponent(content)}">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                  <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                </svg>
                Copy
              </button>
            </div>
          ` : ''}
        </div>
      `;

      messagesList.appendChild(messageEl);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;

      return messageEl;
    }

    // Show typing indicator
    function showTyping() {
      const typingEl = document.createElement('div');
      typingEl.className = 'message';
      typingEl.id = 'typingIndicator';
      typingEl.innerHTML = `
        <div class="avatar avatar-ai">MK</div>
        <div class="message-body">
          <div class="bubble bubble-ai">
            <div class="typing-bubble">
              <div class="typing-dot"></div>
              <div class="typing-dot"></div>
              <div class="typing-dot"></div>
            </div>
          </div>
        </div>
      `;
      messagesList.appendChild(typingEl);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    // Hide typing indicator
    function hideTyping() {
      const typingEl = document.getElementById('typingIndicator');
      if (typingEl) typingEl.remove();
    }

    // Send message to API
    async function sendMessage(userMessage) {
      if (!CONFIG.apiKey || CONFIG.apiKey === 'YOUR_GROQ_API_KEY_HERE') {
        showToast('Please add your Groq API key in the CONFIG section');
        return;
      }

      isGenerating = true;
      sendButton.disabled = true;

      createMessage('user', userMessage);
      conversationHistory.push({ role: 'user', content: userMessage });

      showTyping();

      try {
        const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${CONFIG.apiKey}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            model: CONFIG.model,
            messages: [
              { role: 'system', content: CONFIG.systemPrompt },
              ...conversationHistory
            ],
            temperature: 0.7,
            max_tokens: 2048
          })
        });

        hideTyping();

        if (!response.ok) {
          const errorData = await response.json();
          throw new Error(errorData.error?.message || 'Request failed');
        }

        const data = await response.json();
        const aiResponse = data.choices[0].message.content;

        conversationHistory.push({ role: 'assistant', content: aiResponse });
        createMessage('ai', aiResponse);

      } catch (error) {
        hideTyping();
        createMessage('ai', `Error: ${error.message}`);
        conversationHistory.pop();
        showToast('Failed to get response. Check your API key.');
      }

      isGenerating = false;
      sendButton.disabled = !messageInput.value.trim();
    }

    // Event Listeners
    messageInput.addEventListener('input', () => {
      messageInput.style.height = 'auto';
      messageInput.style.height = Math.min(messageInput.scrollHeight, 150) + 'px';
      sendButton.disabled = !messageInput.value.trim() || isGenerating;
    });

    sendButton.addEventListener('click', () => {
      const message = messageInput.value.trim();
      if (message && !isGenerating) {
        sendMessage(message);
        messageInput.value = '';
        messageInput.style.height = 'auto';
        sendButton.disabled = true;
      }
    });

    messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendButton.click();
      }
    });

    // Suggestion cards
    document.querySelectorAll('.suggestion-card').forEach(card => {
      card.addEventListener('click', () => {
        messageInput.value = card.dataset.prompt;
        messageInput.dispatchEvent(new Event('input'));
        sendButton.click();
      });
    });

    // Copy button
    document.addEventListener('click', (e) => {
      const copyBtn = e.target.closest('.copy-btn');
      if (copyBtn) {
        const content = decodeURIComponent(copyBtn.dataset.content);
        navigator.clipboard.writeText(content).then(() => {
          showToast('Copied to clipboard');
        });
      }
    });

    // Initialize
    createParticles();
  </script>
</body>
</html>
